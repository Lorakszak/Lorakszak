name: Generate Snake

on:
  schedule:
    - cron: "0 */24 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: Lorakszak
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#9affff&color_dots=#0e0e12,#1a1a22,#3a3a42,#7a7a82,#9affff
            dist/snake-light.svg?color_snake=#1a8a8a&color_dots=#e8e4dd,#bcb5a8,#7a7680,#3a3640,#1a8a8a

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
