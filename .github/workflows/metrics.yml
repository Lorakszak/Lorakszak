name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate dark metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Lorakszak
          filename: metrics-dark.svg
          template: classic
          base: header, activity, community, repositories
          config_timezone: Europe/Warsaw
          config_animations: no
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_threshold: 1%
          extras_css: |
            body, .container { background: #040408 !important; color: #f4f1ec !important; }
            .header, .header > * { background: #040408 !important; color: #f4f1ec !important; }
            h2, h3, h4, .title { color: #f4f1ec !important; }
            a, a:link, a:visited, a:hover { color: #f4f1ec !important; }
            .text-muted, .muted, .text-secondary, .small { color: #c9c5be !important; }
            .octicon, svg.octicon, .Octicon { fill: #c9c5be !important; }
            .field, .stat, .label { color: #f4f1ec !important; }
            hr, .border { border-color: #1a1a22 !important; }

      - name: Generate light metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Lorakszak
          filename: metrics-light.svg
          template: classic
          base: header, activity, community, repositories
          config_timezone: Europe/Warsaw
          config_animations: no
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_threshold: 1%
