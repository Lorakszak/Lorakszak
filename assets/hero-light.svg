      .s12 { animation-duration: 9.4s;  animation-delay: -5.0s; }
      .s13 { animation-duration: 11.1s; animation-delay: -3.9s; }

      .name {
        font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
        font-weight: 900;
        font-size: 88px;
        letter-spacing: 0.04em;
      }
      .name-front { fill: #0e0e12; }

      .subtitle {
        font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
        font-weight: 500;
        font-size: 22px;
        letter-spacing: 0.16em;
        fill: #0e0e12;
      }
      .tagline {
        font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
        font-weight: 400;
        font-size: 16px;
        fill: #5a5660;
      }

      @media (prefers-reduced-motion: reduce) {
        .rain text { animation: none !important; }
      }
    </style>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="2" height="2">
      <rect width="2" height="1" fill="#c0bcb4" />
    </pattern>
